services:
  app:
    image: my-site
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      CLAUDE_CODE_WORKER_URL: http://claude-worker:8787
      TRUST_PROXY_HEADERS: 1
    volumes:
      - app-data:/app/data
      - app-uploads:/app/uploads
      - app-next-cache:/app/.next/cache
      - ./content:/app/content
    env_file:
      - .env.local
    depends_on:
      claude-worker:
        condition: service_healthy

  claude-worker:
    image: my-site-claude-worker
    build:
      context: .
      dockerfile: Dockerfile.claude-worker
    restart: unless-stopped
    environment:
      CLAUDE_WORKER_PORT: 8787
      CLAUDE_WORKSPACE_ROOT: /workspaces
      CLAUDE_MAX_PROMPT_CHARS: 20000
      CLAUDE_PERMISSION_MODE: ${CLAUDE_PERMISSION_MODE:-dontAsk}
      CLAUDE_ALLOWED_TOOLS: ${CLAUDE_ALLOWED_TOOLS:-Read,Glob,Grep}
      CLAUDE_DISALLOWED_TOOLS: ${CLAUDE_DISALLOWED_TOOLS:-Bash,Edit,Write,NotebookEdit}
      CLAUDE_MAX_BUDGET_USD: ${CLAUDE_MAX_BUDGET_USD:-}
      CLAUDE_WORKER_TOKEN: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:?CLAUDE_API_KEY is required}
      CLAUDE_API_HOST: ${CLAUDE_API_HOST:-https://www.right.codes/claude}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      ANTHROPIC_API_KEY: ${CLAUDE_API_KEY:?CLAUDE_API_KEY is required}
      ANTHROPIC_BASE_URL: ${CLAUDE_API_HOST:-https://www.right.codes/claude}
      ANTHROPIC_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      USE_BUILTIN_RIPGREP: 0
    volumes:
      - claude-workspaces:/workspaces
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    env_file:
      - .env.local
    restart: unless-stopped
    depends_on:
      - app

volumes:
  app-data:
  app-uploads:
  app-next-cache:
  claude-workspaces:
