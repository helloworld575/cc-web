x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${CONTAINER_LOG_MAX_SIZE:-10m}"
    max-file: "${CONTAINER_LOG_MAX_FILES:-5}"

services:
  app:
    image: my-site:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      CLAUDE_CODE_WORKER_URL: http://claude-worker:8787
      TRUST_PROXY_HEADERS: 1
      SITE_POSTS_DIR: /app/data/posts
      SITE_BUNDLED_POSTS_DIR: /app/content/posts
    volumes:
      - app-data:/app/data
      - app-uploads:/app/uploads
      - app-next-cache:/app/.next/cache
    env_file:
      - .env.local
    depends_on:
      claude-worker:
        condition: service_healthy
    logging: *default-logging

  subscription-cron:
    image: my-site:latest
    restart: unless-stopped
    command: ["node", "scripts/crawl-subscriptions.mjs", "--loop", "--target", "http://app:3000"]
    environment:
      SUBSCRIPTION_CRON_TARGET: http://app:3000
      TZ: Asia/Shanghai
      SUBSCRIPTION_DAILY_HOUR: ${SUBSCRIPTION_DAILY_HOUR:-8}
      SUBSCRIPTION_CRON_RUN_ON_START: ${SUBSCRIPTION_CRON_RUN_ON_START:-1}
      SUBSCRIPTION_CRON_STARTUP_RETRIES: ${SUBSCRIPTION_CRON_STARTUP_RETRIES:-10}
      SUBSCRIPTION_CRON_RETRY_SECONDS: ${SUBSCRIPTION_CRON_RETRY_SECONDS:-30}
      SUBSCRIPTION_CRON_REQUEST_TIMEOUT_MS: ${SUBSCRIPTION_CRON_REQUEST_TIMEOUT_MS:-600000}
    env_file:
      - .env.local
    depends_on:
      - app
    logging: *default-logging

  claude-worker:
    image: ${NAS_CLAUDE_WORKER_IMAGE_NAME:-my-site-claude-worker:latest}
    restart: unless-stopped
    environment:
      CLAUDE_WORKER_PORT: 8787
      CLAUDE_WORKSPACE_ROOT: /workspaces
      CLAUDE_MAX_PROMPT_CHARS: 20000
      CLAUDE_PERMISSION_MODE: ${CLAUDE_PERMISSION_MODE:-dontAsk}
      CLAUDE_ALLOWED_TOOLS: ${CLAUDE_ALLOWED_TOOLS:-Read,Glob,Grep}
      CLAUDE_DISALLOWED_TOOLS: ${CLAUDE_DISALLOWED_TOOLS:-Bash,Edit,Write,NotebookEdit}
      CLAUDE_MAX_BUDGET_USD: ${CLAUDE_MAX_BUDGET_USD:-}
      CLAUDE_WORKER_TOKEN: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:?CLAUDE_API_KEY is required}
      CLAUDE_API_HOST: ${CLAUDE_API_HOST:-https://www.rightapi.ai/claude}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      ANTHROPIC_API_KEY: ${CLAUDE_API_KEY:?CLAUDE_API_KEY is required}
      ANTHROPIC_BASE_URL: ${CLAUDE_API_HOST:-https://www.rightapi.ai/claude}
      ANTHROPIC_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      USE_BUILTIN_RIPGREP: 0
    volumes:
      - claude-workspaces:/workspaces
      - claude-state:/home/claude/.claude
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    restart: unless-stopped
    depends_on:
      - app
    logging: *default-logging

volumes:
  app-data:
  app-uploads:
  app-next-cache:
  claude-workspaces:
  claude-state:
