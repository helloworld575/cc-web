services:
  app:
    image: my-site:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - app-data:/app/data
      - app-uploads:/app/uploads
      # Optionally override built-in content with local posts:
      # - ./content:/app/content
    env_file:
      - .env.local

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    restart: unless-stopped
    depends_on:
      - app

volumes:
  app-data:
  app-uploads:
